name: Auto-label by product and platform

on:
  issues:
    types: [opened, edited]

jobs:
  label:
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - name: Apply labels
        uses: actions/github-script@v7
        with:
          script: |
            const body = context.payload.issue.body || '';

            // Extract selections from a form field.
            // Handles both comma-separated single line and multi-line formats.
            function getSelections(fieldName) {
              const escaped = fieldName.replace(/[()]/g, '\\$&');
              const pattern = new RegExp(`### ${escaped}\\s*\\n([\\s\\S]*?)(?=\\n### |$)`);
              const match = body.match(pattern);
              if (!match) return [];

              const raw = match[1].trim();
              if (!raw || raw === '_No response_') return [];

              return raw
                .split(/[,\n]/)
                .map(s => s.trim())
                .filter(Boolean);
            }

            const products = getSelections('Product(s)');
            const platforms = getSelections('Platform');

            // Product label mapping
            const productLabelMap = {
              'DevTools': 'dev tools',
              'Avalonia for Visual Studio': 'visual studio',
              'Avalonia for Code': 'visual studio code',
              'Parcel': 'parcel',
              'WebView': 'webview',
              'MediaPlayer': 'mediaplayer',
              'TreeDataGrid': 'treedatagrid',
              'Markdown Viewer': 'markdown viewer',
              'Virtual Keyboard': 'virtual keyboard',
            };

            // Platform label mapping
            const platformLabelMap = {
              'Windows': 'windows',
              'macOS': 'macos',
              'Linux': 'linux',
              'iOS': 'ios',
              'Android': 'android',
              'WASM': 'wasm',
            };

            // Category classification
            const tools = ['DevTools', 'Avalonia for Visual Studio', 'Avalonia for Code', 'Parcel'];
            const components = ['WebView', 'MediaPlayer', 'TreeDataGrid', 'Markdown Viewer', 'Virtual Keyboard'];

            // Build the set of labels to apply
            const labelsToAdd = [];

            for (const product of products) {
              const label = productLabelMap[product];
              if (label) labelsToAdd.push(label);
            }

            // Add category labels based on selected products
            const hasTool = products.some(p => tools.includes(p));
            const hasComponent = products.some(p => components.includes(p));
            if (hasTool) labelsToAdd.push('tool');
            if (hasComponent) labelsToAdd.push('component');

            for (const platform of platforms) {
              const label = platformLabelMap[platform];
              if (label) labelsToAdd.push(label);
            }

            if (labelsToAdd.length === 0) return;

            // Remove any existing managed labels first
            const allManagedLabels = [
              ...Object.values(productLabelMap),
              ...Object.values(platformLabelMap),
              'tool',
              'component',
            ];

            const currentLabels = context.payload.issue.labels.map(l => l.name);
            const labelsToRemove = currentLabels.filter(l => allManagedLabels.includes(l));

            for (const old of labelsToRemove) {
              await github.rest.issues.removeLabel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                name: old,
              });
            }

            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              labels: labelsToAdd,
            });
