name: Auto-label and notify Slack

on:
  issues:
    types: [opened, edited]

jobs:
  label-and-notify:
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - name: Apply labels and notify Slack
        uses: actions/github-script@v7
        env:
          SLACK_DEVTOOLS: ${{ secrets.SLACK_WEBHOOK_DEVTOOLS }}
          SLACK_VISUAL_STUDIO: ${{ secrets.SLACK_WEBHOOK_VISUAL_STUDIO }}
          SLACK_VSCODE: ${{ secrets.SLACK_WEBHOOK_VSCODE }}
          SLACK_PARCEL: ${{ secrets.SLACK_WEBHOOK_PARCEL }}
          SLACK_WEBVIEW: ${{ secrets.SLACK_WEBHOOK_WEBVIEW }}
          SLACK_MEDIAPLAYER: ${{ secrets.SLACK_WEBHOOK_MEDIAPLAYER }}
          SLACK_TREEDATAGRID: ${{ secrets.SLACK_WEBHOOK_TREEDATAGRID }}
          SLACK_MARKDOWN_VIEWER: ${{ secrets.SLACK_WEBHOOK_MARKDOWN_VIEWER }}
          SLACK_VIRTUAL_KEYBOARD: ${{ secrets.SLACK_WEBHOOK_VIRTUAL_KEYBOARD }}
        with:
          script: |
            const body = context.payload.issue.body || '';
            const issue = context.payload.issue;

            // Extract selections from a form field.
            // Handles both comma-separated single line and multi-line formats.
            function getSelections(fieldName) {
              const escaped = fieldName.replace(/[()]/g, '\\$&');
              const pattern = new RegExp(`### ${escaped}\\s*\\n([\\s\\S]*?)(?=\\n### |$)`);
              const match = body.match(pattern);
              if (!match) return [];

              const raw = match[1].trim();
              if (!raw || raw === '_No response_') return [];

              return raw
                .split(/[,\n]/)
                .map(s => s.trim())
                .filter(Boolean);
            }

            const products = getSelections('Product(s)');
            const platforms = getSelections('Platform');

            // Product label mapping
            const productLabelMap = {
              'DevTools': 'dev tools',
              'Avalonia for Visual Studio': 'visual studio',
              'Avalonia for Code': 'visual studio code',
              'Parcel': 'parcel',
              'Charts': 'charts',
              'WebView': 'webview',
              'MediaPlayer': 'mediaplayer',
              'TreeDataGrid': 'treedatagrid',
              'Markdown Viewer': 'markdown viewer',
              'Virtual Keyboard': 'virtual keyboard',
            };

            // Platform label mapping
            const platformLabelMap = {
              'Windows': 'windows',
              'macOS': 'macos',
              'Linux': 'linux',
              'iOS': 'ios',
              'Android': 'android',
              'WASM': 'wasm',
            };

            // Product owner mapping 
            const productOwnerMap = {
              'DevTools': 'maxkatz6',
              'Avalonia for Visual Studio': 'mrlacey',
              'Avalonia for Code': 'mrlacey',
              'Parcel': 'maxkatz6',
              'WebView': 'maxkatz6',
              'MediaPlayer': 'jmacato',
              'TreeDataGrid': 'grokys',
              'Markdown Viewer': 'Gillibald',
              'Virtual Keyboard': 'kekekeks',
            };

            // Slack webhook mapping
            const slackWebhookMap = {
              'DevTools': process.env.SLACK_DEVTOOLS,
              'Avalonia for Visual Studio': process.env.SLACK_VISUAL_STUDIO,
              'Avalonia for Code': process.env.SLACK_VSCODE,
              'Parcel': process.env.SLACK_PARCEL,
              'WebView': process.env.SLACK_WEBVIEW,
              'MediaPlayer': process.env.SLACK_MEDIAPLAYER,
              'TreeDataGrid': process.env.SLACK_TREEDATAGRID,
              'Markdown Viewer': process.env.SLACK_MARKDOWN_VIEWER,
              'Virtual Keyboard': process.env.SLACK_VIRTUAL_KEYBOARD,
            };

            // Category classification
            const tools = ['DevTools', 'Avalonia for Visual Studio', 'Avalonia for Code', 'Parcel'];
            const components = ['Charts', 'WebView', 'MediaPlayer', 'TreeDataGrid', 'Markdown Viewer', 'Virtual Keyboard'];

            // --- LABELLING --- 

            const labelsToAdd = [];

            for (const product of products) {
              const label = productLabelMap[product];
              if (label) labelsToAdd.push(label);
            }

            const hasTool = products.some(p => tools.includes(p));
            const hasComponent = products.some(p => components.includes(p));
            if (hasTool) labelsToAdd.push('tool');
            if (hasComponent) labelsToAdd.push('component');

            for (const platform of platforms) {
              const label = platformLabelMap[platform];
              if (label) labelsToAdd.push(label);
            }

            if (labelsToAdd.length > 0) {
              const allManagedLabels = [
                ...Object.values(productLabelMap),
                ...Object.values(platformLabelMap),
                'tool',
                'component',
              ];

              const currentLabels = issue.labels.map(l => l.name);
              const labelsToRemove = currentLabels.filter(l => allManagedLabels.includes(l));

              for (const old of labelsToRemove) {
                await github.rest.issues.removeLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: context.issue.number,
                  name: old,
                });
              }

              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                labels: labelsToAdd,
              });
            }

            // --- ASSIGNING (only on new issues) ---
            if (context.payload.action === 'opened') {
              const assignees = [...new Set(products.map(p => productOwnerMap[p]).filter(Boolean))];

              if (assignees.length > 0) {
                await github.rest.issues.addAssignees({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: context.issue.number,
                  assignees,
                });
              }
            }

            // --- REASSIGNING (on edits) ---
            if (context.payload.action === 'edited') {
              const allOwners = [...new Set(Object.values(productOwnerMap))];
              const currentAssignees = issue.assignees.map(a => a.login);
              const currentManaged = currentAssignees.filter(a => allOwners.includes(a)).sort();
              const newAssignees = [...new Set(products.map(p => productOwnerMap[p]).filter(Boolean))].sort();

              const hasChanged = JSON.stringify(currentManaged) !== JSON.stringify(newAssignees);

              if (hasChanged) {
                if (currentManaged.length > 0) {
                  await github.rest.issues.removeAssignees({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    issue_number: context.issue.number,
                    assignees: currentManaged,
                  });
                }

                if (newAssignees.length > 0) {
                  await github.rest.issues.addAssignees({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    issue_number: context.issue.number,
                    assignees: newAssignees,
                  });
                }
              }
            }

            // --- SLACK NOTIFICATIONS ---

            // Only run this for new issues 
            if (context.payload.action !== 'opened') return;

            const platformTags = platforms.length > 0 ? platforms.join(', ') : 'Not specified';

            for (const product of products) {
              const webhookUrl = slackWebhookMap[product];
              if (!webhookUrl) continue;

              const payload = {
                blocks: [
                  {
                    type: 'section',
                    text: {
                      type: 'mrkdwn',
                      text: `🐛 *<${issue.html_url}|${issue.title}>*`,
                    },
                  },
                  {
                    type: 'context',
                    elements: [
                      {
                        type: 'mrkdwn',
                        text: `*Product:* ${product}  |  *Platform:* ${platformTags}  |  *By:* ${issue.user.login}`,
                      },
                    ],
                  },
                ],
              };

              await fetch(webhookUrl, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload),
              });
            }
