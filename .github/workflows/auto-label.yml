name: Auto-label by product

on:
  issues:
    types: [opened, edited]

jobs:
  label:
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - name: Apply product label
        uses: actions/github-script@v7
        with:
          script: |
            const body = context.payload.issue.body || '';

            const productMatch = body.match(/### Product\s*\n\s*(.+)/);
            if (!productMatch) return;

            const product = productMatch[1].trim();

            const labelMap = {
              'DevTools': 'dev tools',
              'Avalonia for Visual Studio': 'visual studio',
              'Avalonia for Code': 'visual studio code',
              'Parcel': 'parcel',
              'WebView': 'webview',
              'MediaPlayer': 'mediaplayer',
              'TreeDataGrid': 'treedatagrid',
              'Markdown Viewer': 'markdown viewer',
              'Virtual Keyboard': 'virtual keyboard',
            };

            const tools = ['DevTools', 'Avalonia for Visual Studio', 'Avalonia for Code', 'Parcel'];
            const components = ['WebView', 'MediaPlayer', 'TreeDataGrid', 'Markdown Viewer', 'Virtual Keyboard'];

            const productLabel = labelMap[product];
            if (!productLabel) return;

            const categoryLabel = tools.includes(product) ? 'tool' : components.includes(product) ? 'component' : null;

            const currentLabels = context.payload.issue.labels.map(l => l.name);

            // Remove any existing product and category labels
            const allProductLabels = Object.values(labelMap);
            const allCategoryLabels = ['tool', 'component'];
            const labelsToRemove = currentLabels.filter(l => allProductLabels.includes(l) || allCategoryLabels.includes(l));
            for (const old of labelsToRemove) {
              await github.rest.issues.removeLabel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                name: old,
              });
            }

            const labelsToAdd = [productLabel];
            if (categoryLabel) labelsToAdd.push(categoryLabel);

            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              labels: labelsToAdd,
            });
